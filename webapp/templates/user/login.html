{% extends "base.html"%}

{% block content %}
<div class="row">
    <div class="col-4">
        <form action="{{ url_for('user.process_login') }}" method="POST">
            {{ form.hidden_tag() }}
            <div class="form-group">
                {{ form.login.label }}
                {{ form.login() }}
            </div>
            <div class="form-group">
                {{ form.password.label }}
                {{ form.password() }}
            </div>
            <div class="form-group form-check">
                {{ form.remember_me() }}
                {{ form.remember_me.label(class_='form-check-label') }}
            </div>
            {{ form.submit() }}
            <a href="{{ url_for('user.register') }}">Зарегистрироваться</a>
        </form>
    </div>
    <div class="col-8">

    </div>
</div>
{% endblock %}
